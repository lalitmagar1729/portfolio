<!DOCTYPE html>
<html>
<head>
    <title>Favicon Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        canvas {
            border: 2px solid #00d4ff;
            margin: 10px;
            background: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        button {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }
        button:hover {
            opacity: 0.8;
        }
        .preview {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Favicon Generator</h1>
        <p>Click the buttons below to download your favicon files:</p>
        
        <div class="preview">
            <div>
                <h3>16x16</h3>
                <canvas id="canvas16" width="16" height="16"></canvas>
                <br>
                <button onclick="download('canvas16', 'favicon-16x16.png')">Download 16x16</button>
            </div>
            
            <div>
                <h3>32x32</h3>
                <canvas id="canvas32" width="32" height="32"></canvas>
                <br>
                <button onclick="download('canvas32', 'favicon-32x32.png')">Download 32x32</button>
            </div>
            
            <div>
                <h3>180x180 (Apple)</h3>
                <canvas id="canvas180" width="180" height="180"></canvas>
                <br>
                <button onclick="download('canvas180', 'apple-touch-icon.png')">Download Apple Icon</button>
            </div>
        </div>
        
        <button onclick="downloadAll()">Download All</button>
    </div>

    <script>
        function drawFavicon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            
            // Create gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#00d4ff');
            gradient.addColorStop(1, '#7b2ff7');
            
            // Draw rounded rectangle background
            const radius = size * 0.2;
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fill();
            
            // Draw code symbol </> 
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.6}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('</>', size / 2, size / 2);
        }
        
        function download(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        function downloadAll() {
            setTimeout(() => download('canvas16', 'favicon-16x16.png'), 100);
            setTimeout(() => download('canvas32', 'favicon-32x32.png'), 300);
            setTimeout(() => download('canvas180', 'apple-touch-icon.png'), 500);
        }
        
        // Draw all favicons on load
        window.onload = function() {
            drawFavicon(document.getElementById('canvas16'));
            drawFavicon(document.getElementById('canvas32'));
            drawFavicon(document.getElementById('canvas180'));
        };
    </script>
</body>
</html>
